stages:
  - deploy

pages:
  stage: deploy
  image: alpine:3.20
  script:
    - rm -rf public
    - mkdir -p public
    - cp -R frontend/. public/
    - mkdir -p public/website
    - cp -R frontend/. public/website/
    - mkdir -p public/portal
    - cp -R portal/. public/portal/
  artifacts:
    paths:
      - public
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
