      <button aria-label="打开导航" class="icon-btn mobile-toggle" data-mobile-toggle>☰</button>

  <main class="creator-workbench">
    <aside class="studio-dock" aria-label="全局工具">
      <a href="index.html" title="首页">⌂<span>首页</span></a>

    </aside>

    <aside class="production-rail">
      <div class="rail-heading"><span>项目产线</span><b id="stage-progress">1 / 6</b></div>
      <nav class="production-stages">
        <button class="active" data-stage="0"><b>1</b><span>剧本编辑<small>进行中</small></span><i>●</i></button>
        <button data-stage="1"><b>2</b><span>视频设定<small>未开始</small></span><i></i></button>
        <button data-stage="2"><b>3</b><span>场景角色道具<small>未开始</small></span><i></i></button>
        <button data-stage="3"><b>4</b><span>分镜脚本<small>未开始</small></span><i></i></button>
        <button data-stage="4"><b>5</b><span>分镜视频<small>未开始</small></span><i></i></button>
        <button data-stage="5"><b>6</b><span>视频预览<small>未开始</small></span><i></i></button>
      </nav>
      <div class="rail-resume"><span>总体进度</span><b id="rail-percent">16%</b><div class="progress"><span id="rail-progress" style="width:16%"></span></div><button id="save-exit" type="button">保存并退出</button></div>
    </aside>

    <section class="task-canvas">
      <div class="task-heading">
        <div><span class="task-kicker" id="micro-label">1 / 6 · 剧本编辑</span><h1 id="task-title">剧本编辑</h1><p id="task-desc">粘贴或上传剧本内容。当前版本建议上传单集，生成效果更佳。</p></div>
        <span class="skill-runtime" id="save-state">自动保存于刚刚</span>
      </div>

      <section class="guided-task nami-stage-panel" id="guided-task"></section>

      <section class="output-contract">
        <div><span>当前阶段</span><b id="output-name">剧本编辑</b></div>
        <div><span>完成状态</span><b id="output-time">待输入内容</b></div>
        <div><span>下一步</span><b id="output-gate">视频设定</b></div>
      </section>
    </section>

  </main>

          <input type="text" placeholder="短信验证码"/>

          <input type="password" placeholder="密码"/>

          <small>快速注册&nbsp;&nbsp;找回密码</small>
        </div>

    </div>
